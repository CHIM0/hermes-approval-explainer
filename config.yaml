# approval-explainer local config
#
# provider/model are optional. By default the plugin uses Hermes' active model.
# To pin a model, Hermes also requires opt-in in ~/.hermes/config.yaml:
#
# plugins:
#   entries:
#     approval-explainer:
#       llm:
#         allow_provider_override: true
#         allowed_providers: ["deepseek"]
#         allow_model_override: true
#         allowed_models: ["deepseek-v4-flash"]

language: "简体中文"
bullet_count: "3-5"
max_bullet_chars: 45
max_tokens: 260
temperature: 0.1
timeout: 8
llm_wall_timeout: 8
provider: ""
model: ""

# Provider-scoped request extras. These are only applied when the active or
# configured provider matches the key, so MiMo-specific fields are not sent to
# DeepSeek or other models.
provider_extra_body:
  xiaomi:
    thinking:
      type: disabled
    top_p: 0.95

include_session_metadata: false
skip_repeated_after_accept: true
print_to_stderr: true

desktop_notification:
  enabled: true
  title: "Hermes 请求授权"
  open_url: "hermes://"
  # null means the plugin sends the full explanation to the OS notification
  # backend. The OS may still fold or truncate long notifications visually.
  # Set a positive integer to re-enable plugin-side truncation.
  message_chars: null
  fallback_to_stderr: true
  macos:
    prefer_terminal_notifier: true
    activate_bundle_id: "com.nousresearch.hermes"
  windows:
    prefer_burnt_toast: true
    toast_app_logo: "assets/hermes-logo.png"
